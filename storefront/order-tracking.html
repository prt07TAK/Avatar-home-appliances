<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Order — Avatar Home Appliances</title>
  <meta name="description" content="Track your order status at Avatar Home Appliances, Sujangarh. Enter your phone number and order ID.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main>
    <section class="page-header">
      <div class="container">
        <h1>📦 Track Your Order</h1>
        <p>Enter your details to check order status</p>
      </div>
    </section>

    <section class="section">
      <div class="container" style="max-width:700px;">
        <div class="card" style="padding:var(--space-xl);" id="trackingForm">
          <h3 style="margin-bottom:var(--space-xl);">Enter Order Details</h3>
          <form id="trackForm">
            <div class="form-group">
              <label class="form-label" for="trackPhone">Phone Number</label>
              <input type="tel" class="form-input" id="trackPhone" placeholder="Enter your 10-digit phone number" required pattern="[0-9]{10}">
            </div>
            <div class="form-group">
              <label class="form-label" for="trackOrderId">Order ID (first 8 characters)</label>
              <input type="text" class="form-input" id="trackOrderId" placeholder="e.g., A1B2C3D4" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="trackBtn">Track Order</button>
          </form>
        </div>

        <!-- Order Result -->
        <div id="trackingResult" class="hidden" style="margin-top:var(--space-xl);"></div>
      </div>
    </section>
  </main>

  <script type="module" src="/js/order-tracking.js"></script>
</body>
</html>
