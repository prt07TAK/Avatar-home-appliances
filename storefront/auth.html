<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up — Avatar Home Appliances</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: var(--space-xl) auto;
      padding: var(--space-xl);
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }
    .auth-tabs {
      display: flex;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      border-bottom: 2px solid var(--border-color);
      padding-bottom: var(--space-sm);
    }
    .auth-tab {
      background: none;
      border: none;
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0 var(--space-xs);
    }
    .auth-tab.active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
      margin-bottom: calc(-1 * var(--space-sm) - 2px);
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="auth-container">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Login</button>
        <button class="auth-tab" id="tabRegister">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="lEmail" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="lPassword" required>
        </div>
        <div id="loginError" style="color:var(--danger);font-size:var(--text-sm);margin-bottom:var(--space-md);display:none;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="loginBtn">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="rName" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="rEmail" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-input" id="rPhone" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="rPassword" required minlength="6">
        </div>
        <div id="registerError" style="color:var(--danger);font-size:var(--text-sm);margin-bottom:var(--space-md);display:none;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="registerBtn">Create Account</button>
      </form>

      <div class="auth-divider">OR</div>

      <button id="googleAuthBtn" class="btn btn-google" style="width:100%">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" width="18" height="18">
        Continue with Google
      </button>

    </div>
  </main>

  <script type="module" src="/js/auth-page.js"></script>
</body>
</html>
