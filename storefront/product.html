<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details — Avatar Home Appliances</title>
  <meta name="description" content="View product details and order from Avatar Home Appliances, Sujangarh.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main>
    <section class="section">
      <div class="container">
        <div class="breadcrumb">
          <a href="/">Home</a>
          <span class="separator">›</span>
          <a href="/products.html">Products</a>
          <span class="separator">›</span>
          <span id="breadcrumbName">Loading...</span>
        </div>

        <div class="product-detail-grid" id="productDetail">
          <!-- Loaded via JS -->
          <div class="skeleton" style="aspect-ratio:1;border-radius:var(--radius-lg);"></div>
          <div>
            <div class="skeleton skeleton-text" style="width:80%;height:32px;margin-bottom:var(--space-lg);"></div>
            <div class="skeleton skeleton-text" style="width:40%;height:20px;margin-bottom:var(--space-lg);"></div>
            <div class="skeleton skeleton-text" style="width:100%;margin-bottom:var(--space-sm);"></div>
            <div class="skeleton skeleton-text" style="width:90%;margin-bottom:var(--space-sm);"></div>
            <div class="skeleton skeleton-text" style="width:70%;margin-bottom:var(--space-xl);"></div>
            <div class="skeleton skeleton-text" style="width:50%;height:48px;"></div>
          </div>
        </div>

        <!-- Related Products -->
        <div style="margin-top:var(--space-3xl);">
          <h2 style="margin-bottom:var(--space-xl);">Related Products</h2>
          <div class="grid grid-4" id="relatedGrid"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/js/product-detail.js"></script>
</body>
</html>
