<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — Avatar Home Appliances</title>
  <meta name="description" content="Review your cart and proceed to checkout at Avatar Home Appliances, Sujangarh.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main>
    <section class="page-header">
      <div class="container">
        <h1>🛒 Your Cart</h1>
        <p>Review your items and proceed to checkout</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div id="cartContent" style="display:grid;grid-template-columns:1fr 360px;gap:var(--space-xl);align-items:start;">
          <div id="cartItems">
            <!-- Loaded via JS -->
          </div>
          <div class="cart-summary" id="cartSummary">
            <!-- Loaded via JS -->
          </div>
        </div>
        <div id="cartEmpty" class="hidden">
          <div class="empty-state">
            <div class="empty-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Browse our products and add items to your cart</p>
            <a href="/products.html" class="btn btn-primary">Continue Shopping</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/js/cart-page.js"></script>
</body>
</html>
