<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — Avatar Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-page-header">
        <h1>👥 Customers & Leads</h1>
      </div>

      <div class="admin-table-container">
        <div class="admin-table-header">
          <h3>All Customers</h3>
          <div class="search-bar" style="max-width:250px;">
            <span class="search-icon">🔍</span>
            <input type="text" id="customerSearch" placeholder="Search by name or phone...">
          </div>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>City</th>
              <th>Orders</th>
              <th>Total Spent</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="customersBody">
            <tr><td colspan="7" style="text-align:center;padding:var(--space-xl);">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="admin-table-container" style="margin-top:var(--space-xl);">
        <div class="admin-table-header">
          <h3>Service Request Contacts</h3>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Appliance</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="leadsBody">
            <tr><td colspan="5" style="text-align:center;padding:var(--space-xl);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="/js/customers.js"></script>
</body>
</html>
