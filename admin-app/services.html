<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Requests — Avatar Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-page-header">
        <h1>🔧 Service Requests</h1>
        <div class="filter-pills" id="statusFilter">
          <button class="filter-pill active" data-status="all">All</button>
          <button class="filter-pill" data-status="pending">Pending</button>
          <button class="filter-pill" data-status="in_progress">In Progress</button>
          <button class="filter-pill" data-status="done">Done</button>
        </div>
      </div>

      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Phone</th>
              <th>Appliance</th>
              <th>Issue</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="servicesBody">
            <tr><td colspan="7" style="text-align:center;padding:var(--space-xl);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="/js/services.js"></script>
</body>
</html>
