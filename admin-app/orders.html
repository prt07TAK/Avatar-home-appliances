<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Avatar Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-page-header">
        <h1>🧾 Orders</h1>
        <div class="filter-pills" id="statusFilter">
          <button class="filter-pill active" data-status="all">All</button>
          <button class="filter-pill" data-status="pending">Pending</button>
          <button class="filter-pill" data-status="confirmed">Confirmed</button>
          <button class="filter-pill" data-status="dispatched">Dispatched</button>
          <button class="filter-pill" data-status="delivered">Delivered</button>
          <button class="filter-pill" data-status="cancelled">Cancelled</button>
        </div>
      </div>

      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Total</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="8" style="text-align:center;padding:var(--space-xl);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="/js/orders.js"></script>
</body>
</html>
