<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Avatar Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <style>
    /* Cropper Modal Specific Styles */
    #cropModal .modal-body {
      max-height: 70vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-alt);
    }
    #cropImageContainer {
      width: 100%;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #cropImage {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-page-header">
        <h1>📦 Products</h1>
        <button class="btn btn-primary" id="addProductBtn">+ Add Product</button>
      </div>

      <div class="admin-table-container">
        <div class="admin-table-header">
          <h3>All Products</h3>
          <div class="search-bar" style="max-width:250px;">
            <span class="search-icon">🔍</span>
            <input type="text" id="productSearch" placeholder="Search products...">
          </div>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Featured</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsBody">
            <tr><td colspan="6" style="text-align:center;padding:var(--space-xl);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal" id="productModal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Product</h3>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <form id="productForm">
      <input type="hidden" id="productId">
      <div class="form-group">
        <label class="form-label">Product Name *</label>
        <input type="text" class="form-input" id="pName" required>
      </div>
      <div class="form-group">
        <label class="form-label">Category *</label>
        <select class="form-select" id="pCategory" required>
          <option value="fan">Fan</option>
          <option value="tv">TV</option>
          <option value="cooler">Cooler</option>
          <option value="cooler_parts">Cooler Parts</option>
          <option value="sewing_machine">Sewing Machine</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
        <div class="form-group">
          <label class="form-label">Price (₹) *</label>
          <input type="number" class="form-input" id="pPrice" min="0" step="1" required>
        </div>
        <div class="form-group">
          <label class="form-label">Original Price (₹)</label>
          <input type="number" class="form-input" id="pOriginalPrice" min="0" step="1">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Stock *</label>
        <input type="number" class="form-input" id="pStock" min="0" value="0" required>
      </div>
      <div class="form-group">
        <label class="form-label">Product Image</label>
        <input type="file" class="form-input" id="pImageFile" accept="image/*">
        <p style="font-size:var(--text-xs);color:var(--text-light);margin-top:4px;">Leave empty to keep existing image</p>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="pDescription" style="min-height:80px;"></textarea>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:var(--space-md);">
        <label class="toggle-switch">
          <input type="checkbox" id="pFeatured">
          <span class="toggle-slider"></span>
        </label>
        <span style="font-weight:500;">Featured Product</span>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="saveProductBtn">Save Product</button>
    </form>
  </div>

  <!-- Cropper Modal -->
  <div class="modal" id="cropModal" style="z-index: 1000;">
    <div class="modal-header">
      <h3>Crop Image</h3>
      <button class="modal-close" id="cropModalClose">×</button>
    </div>
    <div class="modal-body" style="padding: 0;">
      <div id="cropImageContainer">
        <img id="cropImage" src="">
      </div>
    </div>
    <div class="modal-footer" style="padding: var(--space-md); border-top: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center;">
      <div style="display:flex; gap: 8px;">
        <button class="btn btn-outline btn-sm" id="zoomInBtn" title="Zoom In">🔍 +</button>
        <button class="btn btn-outline btn-sm" id="zoomOutBtn" title="Zoom Out (Add Padding)">🔍 -</button>
        <span style="font-size: 12px; color: var(--text-light); margin-left: 8px; align-self: center;">Scroll or pinch to zoom. Zoom out to add white padding.</span>
      </div>
      <div>
        <button class="btn btn-outline" id="cancelCropBtn" style="margin-right: var(--space-sm);">Cancel</button>
        <button class="btn btn-primary" id="applyCropBtn">Apply Crop</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script type="module" src="/js/products.js"></script>
</body>
</html>
